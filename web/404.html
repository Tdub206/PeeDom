<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | StallPass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f6f7fb 0%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            padding: 16px 32px;
            display: flex;
            align-items: center;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 800;
            color: #3459e6;
            text-decoration: none;
        }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 60px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(52,89,230,0.1);
        }
        .error-code {
            font-size: 96px;
            font-weight: 800;
            background: linear-gradient(135deg, #3459e6 0%, #4d73ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }
        .emoji {
            font-size: 56px;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }
        p {
            color: #66758a;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #3459e6 0%, #4d73ff 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(52,89,230,0.3);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(52,89,230,0.4);
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #66758a;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <span>🚽</span>
            <span>StallPass</span>
        </a>
    </nav>
    <div class="main">
        <div class="card">
            <div class="error-code">404</div>
            <span class="emoji">🚻</span>
            <h1>This stall doesn't exist</h1>
            <p>The page you're looking for has been moved, deleted, or never existed. Let's get you back on track.</p>
            <a href="/" class="btn">Back to StallPass</a>
        </div>
    </div>
    <footer>© 2026 StallPass. All rights reserved.</footer>
</body>
</html>
