<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to StallPass Business</title>
  <meta
    http-equiv="refresh"
    content="0; url=https://stallpass-business-web--stallpass.us-central1.hosted.app"
  >
  <meta
    name="description"
    content="Redirecting to the live StallPass Business dashboard."
  >
  <link
    rel="canonical"
    href="https://stallpass-business-web--stallpass.us-central1.hosted.app"
  >
  <style>
    :root {
      color-scheme: light;
      --bg: #f2efe6;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #1e2620;
      --muted: #5d665d;
      --accent: #135e46;
      --accent-soft: rgba(19, 94, 70, 0.1);
      --border: rgba(30, 38, 32, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(19, 94, 70, 0.12), transparent 45%),
        linear-gradient(180deg, #f7f5ef 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 22px 70px rgba(30, 38, 32, 0.08);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
  <script>
    (function redirectToBusinessApp() {
      var destination = "https://stallpass-business-web--stallpass.us-central1.hosted.app";
      var target = destination + window.location.search + window.location.hash;

      if (window.location.replace) {
        window.location.replace(target);
        return;
      }

      window.location.href = target;
    })();
  </script>
</head>
<body>
  <main>
    <div class="eyebrow">StallPass Business</div>
    <h1>The dashboard moved to the live app.</h1>
    <p>
      Use
      <a href="https://stallpass-business-web--stallpass.us-central1.hosted.app">
        the live StallPass Business dashboard
      </a>
      if the redirect does not happen automatically.
    </p>
  </main>
</body>
</html>
