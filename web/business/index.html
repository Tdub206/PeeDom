<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to StallPass Business</title>
  <meta
    http-equiv="refresh"
    content="0; url=https://stallpass-business-web--stallpass.us-central1.hosted.app"
  >
  <meta
    name="description"
    content="Redirecting to the live StallPass Business dashboard."
  >
  <link
    rel="canonical"
    href="https://stallpass-business-web--stallpass.us-central1.hosted.app"
  >
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0e8;
      --card: #fffaf2;
      --ink: #1f2a1f;
      --muted: #556255;
      --accent: #1f8f61;
      --border: rgba(31, 42, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(31, 143, 97, 0.12), transparent 45%),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(31, 42, 31, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 2.6rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
  <script>
    (function redirectToBusinessApp() {
      var destination = "https://stallpass-business-web--stallpass.us-central1.hosted.app";
      var target = destination + window.location.search + window.location.hash;

      if (window.location.replace) {
        window.location.replace(target);
        return;
      }

      window.location.href = target;
    })();
  </script>
</head>
<body>
  <main>
    <h1>Redirecting to StallPass Business</h1>
    <p>
      This page now lives in the live business app.
      <a href="https://stallpass-business-web--stallpass.us-central1.hosted.app">
        Open the dashboard
      </a>
      if you are not redirected automatically.
    </p>
  </main>
</body>
</html>
