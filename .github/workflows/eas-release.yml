name: EAS Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: Which EAS build profile to use
        required: true
        default: production
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: Submit to the configured store after the build completes
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: eas-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve release arguments
        id: release_args
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            platform="all"
            profile="production"
            auto_submit="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            platform="all"
            profile="production"
            auto_submit="false"
          else
            platform="${{ inputs.platform }}"
            profile="${{ inputs.profile }}"
            auto_submit="${{ inputs.auto_submit }}"
          fi

          if [[ "${profile}" == "production" ]]; then
            eas_environment="production"
          elif [[ "${profile}" == "preview" ]]; then
            eas_environment="preview"
          else
            echo "::error::Unsupported EAS profile: ${profile}"
            exit 1
          fi

          echo "platform=${platform}" >> "$GITHUB_OUTPUT"
          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          echo "auto_submit=${auto_submit}" >> "$GITHUB_OUTPUT"
          echo "eas_environment=${eas_environment}" >> "$GITHUB_OUTPUT"

      - name: Validate release auth and EAS environment
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${EXPO_TOKEN:-}" ]]; then
            echo "::error::EXPO_TOKEN is required for authenticated EAS release automation."
            exit 1
          fi

          eas whoami

          environment="${{ steps.release_args.outputs.eas_environment }}"
          eas env:list "${environment}" --format short > eas-env.txt

          required_vars=("EAS_PROJECT_ID")
          if [[ "${environment}" == "production" ]]; then
            required_vars+=(
              "ANDROID_GOOGLE_MAPS_API_KEY"
              "EXPO_PUBLIC_SUPABASE_URL"
              "EXPO_PUBLIC_SUPABASE_ANON_KEY"
              "EXPO_PUBLIC_SENTRY_DSN"
              "SENTRY_AUTH_TOKEN"
              "SENTRY_ORG"
              "SENTRY_PROJECT"
            )
          fi

          missing=0
          for var in "${required_vars[@]}"; do
            if ! grep -q "^${var}=" eas-env.txt; then
              echo "::error::${var} is missing from the EAS ${environment} environment."
              missing=1
            fi
          done

          exit "${missing}"

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo dependency alignment
        run: npm run check-deps

      - name: Verify store metadata and artwork
        run: npm run store:ready

      - name: Verify Expo config
        shell: bash
        run: |
          set -euo pipefail
          eas env:exec "${{ steps.release_args.outputs.eas_environment }}" "npx expo config --type public > /dev/null" --non-interactive

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --runInBand

      - name: Lint App Store metadata
        if: steps.release_args.outputs.profile == 'production'
        run: npm run store:metadata:lint

      - name: Build with EAS
        shell: bash
        run: |
          set -euo pipefail

          command="eas build --platform ${{ steps.release_args.outputs.platform }} --profile ${{ steps.release_args.outputs.profile }} --non-interactive"
          if [[ "${{ steps.release_args.outputs.auto_submit }}" == "true" ]]; then
            command="${command} --auto-submit"
          fi

          eas env:exec "${{ steps.release_args.outputs.eas_environment }}" "${command}" --non-interactive
