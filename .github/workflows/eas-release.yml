name: EAS Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: Which EAS build profile to use
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: Submit to the configured store after the build completes
        required: true
        default: false
        type: boolean
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: eas-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      EXPO_PUBLIC_ENV: ${{ github.event_name == 'pull_request' && 'preview' || github.event_name == 'push' && 'production' || inputs.profile }}
      ANDROID_GOOGLE_MAPS_API_KEY: ${{ secrets.ANDROID_GOOGLE_MAPS_API_KEY }}
      IOS_GOOGLE_MAPS_API_KEY: ${{ secrets.IOS_GOOGLE_MAPS_API_KEY }}
      ANDROID_ADMOB_APP_ID: ${{ secrets.ANDROID_ADMOB_APP_ID }}
      IOS_ADMOB_APP_ID: ${{ secrets.IOS_ADMOB_APP_ID }}
      # Store submission secrets — only consumed during auto-submit (release tag builds)
      EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
      ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo dependency alignment
        run: npm run check-deps

      - name: Verify Expo config
        run: npx expo config --type public > /dev/null

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --runInBand

      - name: Resolve release arguments
        id: release_args
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "platform=all" >> "$GITHUB_OUTPUT"
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "auto_submit=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "platform=all" >> "$GITHUB_OUTPUT"
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "auto_submit=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "platform=all" >> "$GITHUB_OUTPUT"
            echo "profile=preview" >> "$GITHUB_OUTPUT"
            echo "auto_submit=false" >> "$GITHUB_OUTPUT"
          else
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
            echo "auto_submit=${{ inputs.auto_submit }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          # Always required
          required_vars=("EXPO_TOKEN" "EAS_PROJECT_ID" "EXPO_PUBLIC_SUPABASE_URL" "EXPO_PUBLIC_SUPABASE_ANON_KEY" "EXPO_PUBLIC_API_BASE_URL")
          for var in "${required_vars[@]}"; do
            if [[ -z "${!var}" ]]; then
              echo "::error::$var is required for EAS releases."
              missing=1
            fi
          done

          # Required for production builds (Maps API keys are injected into the native binary)
          if [[ "${{ steps.release_args.outputs.profile }}" == "production" ]]; then
            prod_vars=("ANDROID_GOOGLE_MAPS_API_KEY" "IOS_GOOGLE_MAPS_API_KEY")
            for var in "${prod_vars[@]}"; do
              if [[ -z "${!var}" ]]; then
                echo "::error::$var is required for production EAS builds."
                missing=1
              fi
            done
          fi

          # Required only when auto-submitting to stores (release tag builds)
          if [[ "${{ steps.release_args.outputs.auto_submit }}" == "true" ]]; then
            submit_vars=("EXPO_APPLE_ID" "ASC_APP_ID" "APPLE_TEAM_ID" "EXPO_APPLE_APP_SPECIFIC_PASSWORD" "GOOGLE_SERVICE_ACCOUNT_KEY_JSON")
            for var in "${submit_vars[@]}"; do
              if [[ -z "${!var}" ]]; then
                echo "::error::$var is required for store auto-submission."
                missing=1
              fi
            done
          fi

          exit "$missing"

      - name: Write Google Play service account key
        if: steps.release_args.outputs.auto_submit == 'true'
        shell: bash
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY_JSON" | base64 --decode > /tmp/google-service-account.json
          echo "GOOGLE_SERVICE_ACCOUNT_KEY_PATH=/tmp/google-service-account.json" >> "$GITHUB_ENV"

      - name: Build with EAS
        shell: bash
        run: |
          set -euo pipefail
          COMMAND=(eas build --platform "${{ steps.release_args.outputs.platform }}" --profile "${{ steps.release_args.outputs.profile }}" --non-interactive)
          if [[ "${{ steps.release_args.outputs.auto_submit }}" == "true" ]]; then
            COMMAND+=(--auto-submit)
          fi
          "${COMMAND[@]}"
