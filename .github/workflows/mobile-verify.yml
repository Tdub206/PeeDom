name: Mobile Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: mobile-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo dependency alignment
        run: npm run check-deps

      - name: Verify Expo config
        run: npx expo config --type public > /dev/null

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test
